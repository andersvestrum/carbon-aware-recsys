# NeuMF — Stage 1: GMF pretraining
# Trains only the matrix-factorization branch of NeuMF.
# The resulting checkpoint is loaded as initialization for the fused model.

model: NeuMF
mf_embedding_size: 64
mlp_embedding_size: 64
mlp_hidden_size: [128, 64, 32]
dropout_prob: 0.1

# Stage flags
mf_train: True
mlp_train: False
use_pretrain: False

# Training (Adam, lr 1e-3, 4 negatives — He et al. 2017 recipe)
epochs: 30
train_batch_size: 2048
learning_rate: 0.001
neg_sampling:
  uniform: 4

# K-core filtering (drop users/items with < 5 interactions)
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

eval_args:
  split:
    LS: valid_and_test
  group_by: user
  order: RO
  mode: full

metrics: [NDCG, Recall, MRR]
topk: [10]
valid_metric: NDCG@10
stopping_step: 8
show_progress: true
