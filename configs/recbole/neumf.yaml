# RecBole NeuMF Configuration
# ============================
# Neural Matrix Factorization (He et al., 2017)
# Combines GMF and MLP for learning user-item interactions.

# ── Model ─────────────────────────────────────────────────────────────
model: NeuMF
embedding_size: 64
mlp_hidden_size: [128, 64, 32]
dropout_prob: 0.1
reg_weight: 1.0e-4

# ── Training ──────────────────────────────────────────────────────────
epochs: 50
train_batch_size: 2048
learning_rate: 0.001
neg_sampling:
  uniform: 1
eval_step: 3

# ── Evaluation ────────────────────────────────────────────────────────
eval_args:
  split:
    TS: [0.8, 0.1, 0.1]
  group_by: user
  order: TO
  mode: full

metrics: [NDCG, Recall, MRR]
topk: [10]
valid_metric: NDCG@10
eval_batch_size: 4096

# ── Early stopping ───────────────────────────────────────────────────
stopping_step: 8

# ── Output ────────────────────────────────────────────────────────────
show_progress: true
