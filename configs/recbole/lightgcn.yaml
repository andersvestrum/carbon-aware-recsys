# RecBole LightGCN Configuration
# ================================
# Light Graph Convolutional Network (He et al., 2020)
# Simplified GCN for collaborative filtering on the user-item graph.

# ── Model ─────────────────────────────────────────────────────────────
model: LightGCN
embedding_size: 64
n_layers: 3

# ── Training ──────────────────────────────────────────────────────────
epochs: 50
train_batch_size: 2048
learning_rate: 0.001
neg_sampling:
  uniform: 1

# ── Evaluation ────────────────────────────────────────────────────────
eval_args:
  split:
    LS: valid_and_test
  group_by: user
  order: RO
  mode: full

metrics: [NDCG, Recall, MRR]
topk: [10]
valid_metric: NDCG@10

# ── Early stopping ───────────────────────────────────────────────────
stopping_step: 10

# ── Output ────────────────────────────────────────────────────────────
show_progress: true
