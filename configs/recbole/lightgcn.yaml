# RecBole LightGCN Configuration
# ================================
# Light Graph Convolutional Network (He et al., 2020)
# Simplified GCN for collaborative filtering on the user-item graph.

# ── Model ─────────────────────────────────────────────────────────────
model: LightGCN
embedding_size: 64
n_layers: 2
reg_weight: 1.0e-4

# ── Training ──────────────────────────────────────────────────────────
epochs: 50
train_batch_size: 2048
learning_rate: 0.001
neg_sampling:
  uniform: 1
eval_step: 3

# ── Evaluation ────────────────────────────────────────────────────────
eval_args:
  split:
    TS: [0.8, 0.1, 0.1]
  group_by: user
  order: TO
  mode: full

metrics: [NDCG, Recall, MRR]
topk: [10]
valid_metric: NDCG@10
eval_batch_size: 4096

# ── Early stopping ───────────────────────────────────────────────────
stopping_step: 8

# ── Output ────────────────────────────────────────────────────────────
show_progress: true
