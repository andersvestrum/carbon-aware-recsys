# RecBole BPR Configuration
# =========================
# Default config for Bayesian Personalized Ranking (BPR) model.
# Override via CLI or by passing overrides dict to trainer.train().

# ── Model ─────────────────────────────────────────────────────────────
model: BPR
embedding_size: 64
reg_weight: 1.0e-4

# ── Training ──────────────────────────────────────────────────────────
epochs: 50
train_batch_size: 2048
learning_rate: 0.001
neg_sampling:
  uniform: 1
eval_step: 3                   # slightly tighter validation without heavy overhead

# ── Evaluation ────────────────────────────────────────────────────────
eval_args:
  split:
    TS: [0.8, 0.1, 0.1]      # benchmark files override this; fallback is time-based
  group_by: user
  order: TO                  # timestamp order
  mode: full                 # rank against all items

metrics: [NDCG, Recall, MRR]
topk: [10]
valid_metric: NDCG@10
eval_batch_size: 4096

# ── Early stopping ───────────────────────────────────────────────────
stopping_step: 8

# ── Output ────────────────────────────────────────────────────────────
show_progress: true
