# BPR — k-core filtered variant for fair comparison with NeuMF-pretrained.
# Identical to bpr.yaml except for the user/item filtering.

model: BPR
embedding_size: 64

epochs: 50
train_batch_size: 2048
learning_rate: 0.001
neg_sampling:
  uniform: 1

user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

eval_args:
  split:
    LS: valid_and_test
  group_by: user
  order: RO
  mode: full

metrics: [NDCG, Recall, MRR]
topk: [10]
valid_metric: NDCG@10
stopping_step: 10
show_progress: true
